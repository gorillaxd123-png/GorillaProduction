<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorilla Productions | Intro Animation</title>

    <!-- FontAwesome for varied leaf shapes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #060608;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            position: relative;
            user-select: none;
        }

        /* Viewport Camera Container */
        #viewport-camera {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 200vh;
            transition: transform 3.2s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s ease;
            will-change: transform, opacity;
        }

        .pan-down {
            transform: translateY(-100vh);
        }

        .fade-out {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* SECTION 1: TOP WORLD (TREE AT TOP-LEFT) */
        .world-top {
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Top-Left Bending Tree Container */
        .tree-container {
            position: absolute;
            top: -70px;
            left: -90px;
            width: 600px;
            height: 600px;
        }

        /* Curved SVG Trunk Bending to the Right */
        .tree-trunk-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.05));
        }

        /* Canopy with high density of varied leaves */
        .tree-canopy {
            position: absolute;
            top: 40px;
            left: 90px;
            width: 480px;
            height: 420px;
            z-index: 2;
        }

        .canopy-leaf {
            position: absolute;
            color: #ffffff;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.85));
            animation: organicSway 3.5s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite alternate;
        }

        @keyframes organicSway {
            0% { transform: rotate(-12deg) scale(0.92); }
            100% { transform: rotate(14deg) scale(1.08); }
        }

        /* SECTION 2: BOTTOM WORLD (GROUND & BRANDING) */
        .world-bottom {
            height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Centered Black & Gray Outline Ground */
        .ground-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ground-line {
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent 0%, #4a4a5a 25%, #a0a0b8 50%, #4a4a5a 75%, transparent 100%);
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.25);
        }

        .ground-fill {
            width: 100%;
            height: 100%;
            background: #000000;
        }

        /* HERO TRAVELLING LEAF ELEMENT (X) */
        #hero-leaf {
            position: absolute;
            top: 220px;
            left: 320px;
            font-size: 2.8rem;
            color: #ffffff;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.9))
                    drop-shadow(0 0 30px rgba(255, 255, 255, 0.5));
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Step 1: Leaf falls from top-left tree to touch ground */
        .animate-leaf-drop {
            animation: leafFallingToGround 4.2s cubic-bezier(0.42, 0, 0.58, 1) forwards;
        }

        @keyframes leafFallingToGround {
            0% {
                opacity: 1;
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(120px, 280px) rotate(45deg);
            }
            50% {
                transform: translate(240px, 620px) rotate(-35deg);
            }
            75% {
                transform: translate(160px, 1020px) rotate(20deg);
            }
            92% {
                opacity: 1;
                transform: translate(220px, 1340px) rotate(-60deg);
            }
            100% {
                opacity: 1;
                transform: translate(240px, 1350px) rotate(-80deg); /* Touches Ground */
            }
        }

        /* Step 2: Wind blows leaf up across screen creating text trail */
        .animate-leaf-wind-blow {
            animation: leafWindBlowUp 2.2s cubic-bezier(0.22, 1, 0.36, 1) forwards !important;
        }

        @keyframes leafWindBlowUp {
            0% {
                transform: translate(240px, 1350px) rotate(-80deg) scale(1);
                opacity: 1;
            }
            40% {
                transform: translate(100px, 1180px) rotate(-240deg) scale(1.3);
                opacity: 0.9;
            }
            100% {
                /* Target left side of screen to start text trail */
                transform: translate(calc(50vw - 380px), 1000px) rotate(-360deg) scale(1.1);
                opacity: 1;
            }
        }

        /* Step 3: Leaf returns directly to position X (Gorilla ProductionsX) */
        .animate-leaf-return-to-text {
            animation: returnToTextPosition 2.0s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards !important;
        }

        @keyframes returnToTextPosition {
            0% {
                transform: translate(calc(50vw - 380px), 1000px) rotate(-360deg) scale(1.1);
            }
            100% {
                /* Precise Leaf Position X right after "Gorilla Productions" */
                transform: translate(calc(50vw + 345px), 982px) rotate(18deg) scale(0.7);
            }
        }

        /* Wind canvas overlay */
        #wind-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        /* CENTERED CONTAINER FOR BRANDING AND ENTER BUTTON */
        .center-content-wrapper {
            position: relative;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
        }

        /* CENTERED TITLE WITH TRAIL GLOW */
        .branding-title {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            text-align: center;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 1.5s ease, transform 1.5s ease;

            background: linear-gradient(
                110deg,
                #6a6a7a 0%,
                #ffffff 45%,
                #ffffff 55%,
                #6a6a7a 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Reveal state when trailing leaf sweeps past */
        .branding-title.show {
            opacity: 1;
            transform: scale(1);
            animation: whiteNeonGlow 3s ease-in-out infinite alternate,
                       textSheenLoop 4s linear infinite;
        }

        @keyframes whiteNeonGlow {
            0% {
                filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8))
                        drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
            }
            100% {
                filter: drop-shadow(0 0 16px rgba(255, 255, 255, 1))
                        drop-shadow(0 0 35px rgba(255, 255, 255, 0.85))
                        drop-shadow(0 0 65px rgba(255, 255, 255, 0.4));
            }
        }

        @keyframes textSheenLoop {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* Spacer keeping exact spot open for Leaf Position X */
        .leaf-spacer {
            display: inline-block;
            width: 2rem;
        }

        /* CLICK TO ENTER PROMPT */
        .click-to-enter {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.35em;
            color: rgba(255, 255, 255, 0.85);
            opacity: 0;
            cursor: pointer;
            transition: opacity 1.2s ease, transform 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }

        .click-to-enter.show {
            opacity: 1;
        }

        .click-to-enter:hover {
            transform: scale(1.08);
            color: #ffffff;
            text-shadow: 0 0 18px rgba(255, 255, 255, 1);
        }

        @keyframes pulseGlow {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Responsive scaling */
        @media (max-width: 768px) {
            .branding-title {
                font-size: 1.6rem;
                letter-spacing: 0.12em;
            }
            .click-to-enter {
                font-size: 0.85rem;
                letter-spacing: 0.2em;
            }
            .tree-container {
                transform: scale(0.65);
                left: -120px;
                top: -90px;
            }
        }
    </style>
</head>
<body>

    <div id="viewport-camera">
        
        <!-- TOP VIEWPORT: TOP-LEFT BENDING TREE WITH FULL CANOPY -->
        <div class="world-top">
            <div class="tree-container">
                <!-- SVG Trunk extending off top-left screen and bending to the right -->
                <svg class="tree-trunk-svg" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 -20 C 80 80, 140 180, 220 260 C 280 320, 360 380, 420 420" stroke="#22222d" stroke-width="34" stroke-linecap="round"/>
                    <path d="M140 180 C 220 140, 290 120, 370 110" stroke="#22222d" stroke-width="20" stroke-linecap="round"/>
                    <path d="M220 260 C 290 230, 350 220, 420 210" stroke="#22222d" stroke-width="16" stroke-linecap="round"/>
                    <path d="M100 120 C 180 80, 250 60, 320 50" stroke="#22222d" stroke-width="14" stroke-linecap="round"/>
                </svg>

                <!-- Dense Canopy -->
                <div class="tree-canopy" id="tree-canopy"></div>
            </div>
        </div>

        <!-- HERO TRAVELLING LEAF ELEMENT (X) -->
        <div id="hero-leaf">
            <i class="fa-solid fa-leaf"></i>
        </div>

        <!-- BOTTOM VIEWPORT: GROUND & CENTERED CONTENT -->
        <div class="world-bottom">
            <canvas id="wind-canvas"></canvas>

            <!-- Centered Text & Click Prompt -->
            <div class="center-content-wrapper">
                <h1 id="title" class="branding-title">
                    Gorilla Productions<span class="leaf-spacer"></span>
                </h1>
                <div id="enter-btn" class="click-to-enter">Click To Enter</div>
            </div>

            <!-- Centered Black & Gray Outline Ground -->
            <div class="ground-wrapper">
                <div class="ground-line"></div>
                <div class="ground-fill"></div>
            </div>
        </div>

    </div>

    <script>
        // 1. DENSE CANOPY LEAF GENERATION (OVER 35 LEAVES)
        const canopy = document.getElementById('tree-canopy');
        
        const leafIcons = [
            'fa-solid fa-leaf',         // Standard leaf
            'fa-brands fa-envira',      // Dual leaf
            'fa-solid fa-seedling',     // Twin sprout
            'fa-solid fa-clover'        // Soft leaf shape
        ];

        // Grid overlay for lush canopy density
        const leafPositions = [];
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 6; c++) {
                leafPositions.push({
                    top: `${20 + r * 55 + Math.random() * 20}px`,
                    left: `${40 + c * 65 + Math.random() * 25}px`,
                    size: `${(2.0 + Math.random() * 1.4).toFixed(1)}rem`,
                    rot: `${Math.floor(Math.random() * 80 - 40)}deg`,
                    iconIdx: Math.floor(Math.random() * leafIcons.length)
                });
            }
        }

        leafPositions.forEach((pos, idx) => {
            const leaf = document.createElement('i');
            leaf.className = `${leafIcons[pos.iconIdx]} canopy-leaf`;
            leaf.style.top = pos.top;
            leaf.style.left = pos.left;
            leaf.style.fontSize = pos.size;
            leaf.style.transform = `rotate(${pos.rot})`;
            leaf.style.animationDelay = `${(idx % 7) * 0.25}s`;
            canopy.appendChild(leaf);
        });

        // 2. TIMED ANIMATION SEQUENCER
        const camera = document.getElementById('viewport-camera');
        const heroLeaf = document.getElementById('hero-leaf');
        const title = document.getElementById('title');
        const enterBtn = document.getElementById('enter-btn');

        // Step A: Leaf falls from top-left tree (0.4s)
        setTimeout(() => {
            heroLeaf.classList.add('animate-leaf-drop');
        }, 400);

        // Step B: Camera pans down toward ground (1.8s)
        setTimeout(() => {
            camera.classList.add('pan-down');
        }, 1800);

        // Step C: Leaf touches ground -> Wind blows leaf up (4.6s)
        setTimeout(() => {
            heroLeaf.classList.add('animate-leaf-wind-blow');
            triggerWindCanvasEffect();
        }, 4600);

        // Step D: Gorilla Productions reveals as trail behind blowing leaf (5.4s)
        setTimeout(() => {
            title.classList.add('show');
        }, 5400);

        // Step E: Leaf returns to position X (Gorilla ProductionsX) (6.6s)
        setTimeout(() => {
            heroLeaf.classList.add('animate-leaf-return-to-text');
        }, 6600);

        // Step F: Show "Click To Enter" prompt (8.2s)
        setTimeout(() => {
            enterBtn.classList.add('show');
        }, 8200);

        // 3. CLICK TO ENTER -> BLANK SCREEN TRANSITION
        document.body.addEventListener('click', () => {
            if (enterBtn.classList.contains('show')) {
                camera.classList.add('fade-out');
            }
        });

        // 4. CANVAS WIND STREAM LINES EFFECT
        function triggerWindCanvasEffect() {
            const canvas = document.getElementById('wind-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const lines = [];
            for (let i = 0; i < 35; i++) {
                lines.push({
                    x: Math.random() * -200 - 100,
                    y: canvas.height - 180 + (Math.random() * 120 - 60),
                    length: 120 + Math.random() * 160,
                    speed: 22 + Math.random() * 18,
                    width: 1 + Math.random() * 2.5,
                    alpha: 0.3 + Math.random() * 0.6
                });
            }

            let frames = 0;
            function renderWind() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                lines.forEach(line => {
                    ctx.beginPath();
                    ctx.moveTo(line.x, line.y);
                    ctx.lineTo(line.x + line.length, line.y - 30);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${line.alpha})`;
                    ctx.lineWidth = line.width;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ffffff';
                    ctx.stroke();

                    line.x += line.speed;
                });

                frames++;
                if (frames < 75) {
                    requestAnimationFrame(renderWind);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            renderWind();
        }
    </script>
</body>
</html>
