<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorilla Productions | Intro Animation</title>

    <!-- FontAwesome for the leaf shape -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Montserrat for sleek bold typography -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #060608;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            position: relative;
        }

        /* Viewport Camera Container that pans down */
        #viewport-camera {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 200vh; /* Extended height for vertical panning */
            transition: transform 3.2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            will-change: transform;
        }

        /* State trigger to pan camera down */
        .pan-down {
            transform: translateY(-100vh);
        }

        /* SECTION 1: TOP WORLD (TREE & CANOPY) */
        .world-top {
            height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Leaf-based Tree Structure Container */
        .tree-container {
            position: relative;
            width: 400px;
            height: 500px;
            display: flex;
            justify-content: center;
        }

        /* Stylized Minimal Tree Trunk */
        .tree-trunk {
            position: absolute;
            bottom: 0;
            width: 24px;
            height: 280px;
            background: linear-gradient(180deg, #2a2a35 0%, #121218 100%);
            border-radius: 12px 12px 0 0;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .tree-branch-left, .tree-branch-right {
            position: absolute;
            background: #2a2a35;
            height: 10px;
            border-radius: 5px;
        }
        .tree-branch-left {
            width: 90px;
            top: 120px;
            left: 125px;
            transform: rotate(-25deg);
        }
        .tree-branch-right {
            width: 100px;
            top: 90px;
            right: 110px;
            transform: rotate(20deg);
        }

        /* Canopy composed purely of white glowing leaves */
        .tree-canopy {
            position: absolute;
            top: 20px;
            width: 320px;
            height: 260px;
        }

        .canopy-leaf {
            position: absolute;
            color: #ffffff;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
            animation: gentleSway 3s ease-in-out infinite alternate;
        }

        @keyframes gentleSway {
            0% { transform: rotate(-5deg) scale(0.98); }
            100% { transform: rotate(8deg) scale(1.05); }
        }

        /* SECTION 2: BOTTOM WORLD (GROUND & REVEAL) */
        .world-bottom {
            height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Ground line (Black fill with gray outline) */
        .ground-wrapper {
            position: absolute;
            bottom: 0;
            width: 100vw;
            height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ground-line {
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent 5%, #4a4a5a 25%, #8a8a9e 50%, #4a4a5a 75%, transparent 95%);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .ground-fill {
            width: 100%;
            height: 100%;
            background: #000000;
        }

        /* Hero Falling Leaf element traveling across screens */
        #falling-leaf {
            position: absolute;
            top: 220px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.8rem;
            color: #ffffff;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.9))
                    drop-shadow(0 0 30px rgba(255, 255, 255, 0.5));
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        /* Animation Keyframes for the falling leaf path */
        .animate-leaf-drop {
            animation: leafFallingPath 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes leafFallingPath {
            0% {
                opacity: 1;
                transform: translate(-50%, 0) rotate(0deg);
            }
            25% {
                transform: translate(calc(-50% + 70px), 250px) rotate(45deg);
            }
            50% {
                transform: translate(calc(-50% - 60px), 600px) rotate(-30deg);
            }
            75% {
                transform: translate(calc(-50% + 40px), 950px) rotate(20deg);
            }
            92% {
                transform: translate(-50%, 1285px) rotate(70deg);
                opacity: 1;
            }
            /* Land on ground */
            100% {
                transform: translate(-50%, 1295px) rotate(85deg);
                opacity: 1;
            }
        }

        /* Wind Blowing Effect */
        .animate-leaf-blow {
            animation: leafBlowAway 1.2s ease-in forwards !important;
        }

        @keyframes leafBlowAway {
            0% {
                transform: translate(-50%, 1295px) rotate(85deg);
                opacity: 1;
            }
            30% {
                transform: translate(120px, 1260px) rotate(180deg) scale(1.1);
                opacity: 0.9;
            }
            100% {
                transform: translate(800px, 1180px) rotate(480deg) scale(0.2);
                opacity: 0;
                filter: blur(8px);
            }
        }

        /* Wind trail lines canvas */
        #wind-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 90;
        }

        /* Gorilla Productions Final Branding Reveal */
        .branding-title {
            position: relative;
            z-index: 200;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            text-align: center;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: opacity 1.8s ease-out, transform 1.8s ease-out;

            background: linear-gradient(
                110deg,
                #7a7a8a 0%,
                #ffffff 45%,
                #ffffff 55%,
                #7a7a8a 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .branding-title.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.9))
                    drop-shadow(0 0 25px rgba(255, 255, 255, 0.6))
                    drop-shadow(0 0 45px rgba(255, 255, 255, 0.3));
            animation: whiteNeonGlow 3s ease-in-out infinite alternate,
                       textSheenLoop 4s linear infinite;
        }

        @keyframes whiteNeonGlow {
            0% {
                filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8))
                        drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
            }
            100% {
                filter: drop-shadow(0 0 14px rgba(255, 255, 255, 1))
                        drop-shadow(0 0 32px rgba(255, 255, 255, 0.8))
                        drop-shadow(0 0 60px rgba(255, 255, 255, 0.4));
            }
        }

        @keyframes textSheenLoop {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .attached-leaf {
            display: inline-block;
            font-size: 1.8rem;
            color: #ffffff;
            margin-left: -0.15em;
            vertical-align: middle;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.9));
            animation: subtlePulse 2s ease-in-out infinite alternate;
        }

        @keyframes subtlePulse {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.15) rotate(12deg); }
        }

        /* Responsive styling for smaller displays */
        @media (max-width: 768px) {
            .branding-title {
                font-size: 1.8rem;
                letter-spacing: 0.15em;
            }
            .attached-leaf {
                font-size: 1.1rem;
            }
            .tree-container {
                transform: scale(0.85);
            }
        }
    </style>
</head>
<body>

    <div id="viewport-camera">
        
        <!-- TOP VIEWPORT: TREE MADE OF WHITE LEAVES -->
        <div class="world-top">
            <div class="tree-container">
                <div class="tree-trunk"></div>
                <div class="tree-branch-left"></div>
                <div class="tree-branch-right"></div>
                
                <!-- Canopy constructed from grouped white leaves -->
                <div class="tree-canopy" id="tree-canopy">
                    <!-- Leaves generated dynamically via JS for natural shape -->
                </div>
            </div>
        </div>

        <!-- HERO FALLING LEAF ELEMENT -->
        <div id="falling-leaf">
            <i class="fa-solid fa-leaf"></i>
        </div>

        <!-- BOTTOM VIEWPORT: GROUND & TEXT REVEAL -->
        <div class="world-bottom">
            <canvas id="wind-canvas"></canvas>

            <!-- Final Reveal Branding Font -->
            <h1 id="title" class="branding-title">
                Gorilla Productions<span class="attached-leaf"><i class="fa-solid fa-leaf"></i></span>
            </h1>

            <!-- Black & Gray Outline Ground -->
            <div class="ground-wrapper">
                <div class="ground-line"></div>
                <div class="ground-fill"></div>
            </div>
        </div>

    </div>

    <script>
        // 1. DYNAMICALLY BUILD THE TREE CANOPY USING WHITE LEAF ICONS
        const canopy = document.getElementById('tree-canopy');
        const leafPositions = [
            { top: '10px', left: '120px', size: '2.5rem', rot: '0deg' },
            { top: '25px', left: '80px', size: '2rem', rot: '-20deg' },
            { top: '25px', left: '170px', size: '2.2rem', rot: '25deg' },
            { top: '50px', left: '40px', size: '1.8rem', rot: '-40deg' },
            { top: '55px', left: '210px', size: '2rem', rot: '35deg' },
            { top: '80px', left: '20px', size: '2.2rem', rot: '-50deg' },
            { top: '85px', left: '130px', size: '2.8rem', rot: '10deg' },
            { top: '80px', left: '240px', size: '1.9rem', rot: '45deg' },
            { top: '120px', left: '60px', size: '2.4rem', rot: '-15deg' },
            { top: '120px', left: '180px', size: '2.3rem', rot: '20deg' },
            { top: '150px', left: '100px', size: '2.1rem', rot: '-5deg' },
            { top: '150px', left: '150px', size: '2rem', rot: '15deg' },
            { top: '40px', left: '110px', size: '2.6rem', rot: '-10deg' },
            { top: '90px', left: '90px', size: '2.2rem', rot: '-30deg' },
            { top: '100px', left: '170px', size: '2.4rem', rot: '15deg' }
        ];

        leafPositions.forEach((pos, idx) => {
            const leaf = document.createElement('i');
            leaf.className = 'fa-solid fa-leaf canopy-leaf';
            leaf.style.top = pos.top;
            leaf.style.left = pos.left;
            leaf.style.fontSize = pos.size;
            leaf.style.transform = `rotate(${pos.rot})`;
            leaf.style.animationDelay = `${(idx % 5) * 0.4}s`;
            canopy.appendChild(leaf);
        });

        // 2. TIMED ANIMATION SEQUENCE CONTROLLER
        const camera = document.getElementById('viewport-camera');
        const fallingLeaf = document.getElementById('falling-leaf');
        const title = document.getElementById('title');

        // Step A: Trigger the leaf detachment & fall (0.5s)
        setTimeout(() => {
            fallingLeaf.classList.add('animate-leaf-drop');
        }, 500);

        // Step B: Pan Viewport Downward tracking the falling leaf (1.8s)
        setTimeout(() => {
            camera.classList.add('pan-down');
        }, 1800);

        // Step C: Leaf lands on ground, blow away by wind gust (4.3s)
        setTimeout(() => {
            fallingLeaf.classList.add('animate-leaf-blow');
            triggerWindCanvasEffect();
        }, 4300);

        // Step D: Reveal Gorilla Productions Glowing Text (5.2s)
        setTimeout(() => {
            title.classList.add('show');
        }, 5200);

        // 3. CANVAS WIND STREAM LINES EFFECT
        function triggerWindCanvasEffect() {
            const canvas = document.getElementById('wind-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const lines = [];
            for (let i = 0; i < 25; i++) {
                lines.push({
                    x: Math.random() * -300,
                    y: canvas.height - 180 + (Math.random() * 100 - 50),
                    length: 80 + Math.random() * 120,
                    speed: 18 + Math.random() * 15,
                    width: 1 + Math.random() * 2,
                    alpha: 0.3 + Math.random() * 0.5
                });
            }

            let frames = 0;
            function renderWind() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                lines.forEach(line => {
                    ctx.beginPath();
                    ctx.moveTo(line.x, line.y);
                    ctx.lineTo(line.x + line.length, line.y);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${line.alpha})`;
                    ctx.lineWidth = line.width;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#ffffff';
                    ctx.stroke();

                    line.x += line.speed;
                });

                frames++;
                if (frames < 70) {
                    requestAnimationFrame(renderWind);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            renderWind();
        }
    </script>
</body>
</html>
