<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorilla Productions</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for the white leaf icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #08080c;
            color: #ffffff;
            overflow: hidden;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Subtle dark tech grid background */
        .grid-bg {
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Hero White Neon Glow Effect */
        .white-neon-glow {
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.9),
                         0 0 16px rgba(255, 255, 255, 0.6),
                         0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* Continuous Text Shine Animation Loop */
        @keyframes textShineAnimation {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .branding-text-shine {
            background: linear-gradient(
                90deg,
                #ffffff 0%,
                #a1a1aa 25%,
                #ffffff 50%,
                #a1a1aa 75%,
                #ffffff 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShineAnimation 3s linear infinite;
        }

        /* Ambient White Falling & Swinging Leaves */
        .ambient-leaf-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        @keyframes ambientLeaf {
            0% {
                transform: translateY(-10vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.8;
            }
            50% {
                transform: translateY(50vh) translateX(50px) rotate(180deg);
            }
            85% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) translateX(-30px) rotate(360deg);
                opacity: 0;
            }
        }

        .ambient-leaf {
            position: absolute;
            color: #ffffff;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
            animation: ambientLeaf 10s ease-in-out infinite;
            top: -5vh;
        }

        /* Pulse glow under text */
        .ambient-glow-orb {
            position: absolute;
            width: 450px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body class="grid-bg relative select-none">

    <!-- AMBIENT GLOW ORB -->
    <div class="ambient-glow-orb"></div>

    <!-- BACKGROUND FALLING & SWINGING WHITE LEAVES -->
    <div class="ambient-leaf-container">
        <div class="ambient-leaf" style="left: 10%; animation-delay: 0s; animation-duration: 9s; font-size: 1.2rem;">
            <i class="fa-solid fa-leaf"></i>
        </div>
        <div class="ambient-leaf" style="left: 28%; animation-delay: 2.5s; animation-duration: 12s; font-size: 0.9rem;">
            <i class="fa-solid fa-leaf"></i>
        </div>
        <div class="ambient-leaf" style="left: 50%; animation-delay: 5s; animation-duration: 11s; font-size: 1.5rem;">
            <i class="fa-solid fa-leaf"></i>
        </div>
        <div class="ambient-leaf" style="left: 72%; animation-delay: 1s; animation-duration: 10s; font-size: 1.1rem;">
            <i class="fa-solid fa-leaf"></i>
        </div>
        <div class="ambient-leaf" style="left: 88%; animation-delay: 3.5s; animation-duration: 13s; font-size: 0.8rem;">
            <i class="fa-solid fa-leaf"></i>
        </div>
    </div>

    <!-- MAIN BRANDING TEXT & LEAF HEADER -->
    <main class="relative z-10 text-center px-4">
        <div class="relative inline-block group cursor-default">
            
            <!-- Glowing Shimmering Title Text -->
            <h1 class="branding-text-shine white-neon-glow font-black text-4xl sm:text-6xl md:text-7xl tracking-widest uppercase">
                Gorilla Productions
            </h1>

            <!-- White Leaf Icon attached to the text -->
            <i class="fa-solid fa-leaf text-white text-2xl sm:text-4xl absolute -right-8 sm:-right-12 bottom-1 sm:bottom-2 filter drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] transition-transform duration-500 group-hover:rotate-12 group-hover:scale-125"></i>

        </div>
    </main>

</body>
</html>
