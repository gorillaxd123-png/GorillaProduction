<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorilla Productions | Intro Animation</title>

    <!-- FontAwesome for diverse leaf shapes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Montserrat for sleek bold typography -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #060608;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            position: relative;
        }

        /* Viewport Camera Container for Vertical Pan */
        #viewport-camera {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 200vh;
            transition: transform 3.2s cubic-bezier(0.77, 0, 0.175, 1); /* Custom smooth slow-to-fast easing */
            will-change: transform;
        }

        .pan-down {
            transform: translateY(-100vh);
        }

        /* SECTION 1: TOP WORLD (TREE AT CORNER) */
        .world-top {
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Corner Tree Styling & Positioning */
        .tree-container {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 480px;
            height: 600px;
            display: flex;
            justify-content: center;
        }

        /* Organic Curved Tree Trunk & Branches */
        .tree-trunk-svg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.05));
        }

        /* Rich Canopy constructed from various leaf shapes */
        .tree-canopy {
            position: absolute;
            top: 10px;
            right: 20px;
            width: 400px;
            height: 380px;
            z-index: 2;
        }

        .canopy-leaf {
            position: absolute;
            color: #ffffff;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.85));
            animation: organicSway 3.5s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite alternate;
        }

        @keyframes organicSway {
            0% { transform: rotate(-8deg) scale(0.95); }
            100% { transform: rotate(10deg) scale(1.06); }
        }

        /* SECTION 2: BOTTOM WORLD (GROUND & REVEAL) */
        .world-bottom {
            height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Black and Gray Outline Ground */
        .ground-wrapper {
            position: absolute;
            bottom: 0;
            width: 100vw;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ground-line {
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent 0%, #4a4a5a 20%, #9a9ab0 50%, #4a4a5a 80%, transparent 100%);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
        }

        .ground-fill {
            width: 100%;
            height: 100%;
            background: #000000;
        }

        /* HERO TRAVELLING LEAF ELEMENT */
        #hero-leaf {
            position: absolute;
            top: 180px;
            right: 220px;
            font-size: 2.8rem;
            color: #ffffff;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.9))
                    drop-shadow(0 0 30px rgba(255, 255, 255, 0.5));
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Step 1: Leaf falls from corner tree to the ground */
        .animate-leaf-drop {
            animation: leafFallingToGround 4.2s cubic-bezier(0.42, 0, 0.58, 1) forwards;
        }

        @keyframes leafFallingToGround {
            0% {
                opacity: 1;
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(-120px, 280px) rotate(-45deg);
            }
            50% {
                transform: translate(-280px, 620px) rotate(35deg);
            }
            75% {
                transform: translate(-420px, 1020px) rotate(-20deg);
            }
            92% {
                opacity: 1;
                transform: translate(-500px, 1340px) rotate(60deg);
            }
            100% {
                opacity: 1;
                transform: translate(-520px, 1350px) rotate(80deg); /* Touch ground */
            }
        }

        /* Step 2: Wind blows the leaf up off the ground */
        .animate-leaf-wind-blow {
            animation: leafWindBlowUp 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards !important;
        }

        @keyframes leafWindBlowUp {
            0% {
                transform: translate(-520px, 1350px) rotate(80deg) scale(1);
                opacity: 1;
            }
            40% {
                transform: translate(-200px, 1220px) rotate(240deg) scale(1.3);
                opacity: 0.9;
            }
            100% {
                /* Float into exact middle center screen area */
                transform: translate(calc(-50vw + 220px + 330px), 1000px) rotate(360deg) scale(1.1);
                opacity: 1;
            }
        }

        /* Step 3: Leaf returns smoothly to attach to the end of the text */
        .animate-leaf-return-to-text {
            animation: returnToTextPosition 2.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards !important;
        }

        @keyframes returnToTextPosition {
            0% {
                transform: translate(calc(-50vw + 220px + 330px), 1000px) rotate(360deg) scale(1.1);
            }
            100% {
                /* Target exact inline offset at the end of Gorilla Productions */
                transform: translate(calc(-50vw + 220px + 382px), 982px) rotate(15deg) scale(0.65);
            }
        }

        /* Wind canvas overlays */
        #wind-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        /* CENTRED GORILLA PRODUCTIONS BRANDING TITLE */
        .branding-title {
            position: relative;
            z-index: 200;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            text-align: center;
            opacity: 0;
            transform: scale(0.92);
            transition: opacity 1.8s ease, transform 1.8s ease;

            background: linear-gradient(
                110deg,
                #6a6a7a 0%,
                #ffffff 45%,
                #ffffff 55%,
                #6a6a7a 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .branding-title.show {
            opacity: 1;
            transform: scale(1);
            animation: whiteNeonGlow 3s ease-in-out infinite alternate,
                       textSheenLoop 4s linear infinite;
        }

        @keyframes whiteNeonGlow {
            0% {
                filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8))
                        drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
            }
            100% {
                filter: drop-shadow(0 0 16px rgba(255, 255, 255, 1))
                        drop-shadow(0 0 35px rgba(255, 255, 255, 0.85))
                        drop-shadow(0 0 65px rgba(255, 255, 255, 0.4));
            }
        }

        @keyframes textSheenLoop {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* Invisible placeholder box reserving exact end space for leaf */
        .leaf-spacer {
            display: inline-block;
            width: 1.8rem;
        }

        /* Responsive scaling */
        @media (max-width: 768px) {
            .branding-title {
                font-size: 1.7rem;
                letter-spacing: 0.12em;
            }
            .tree-container {
                transform: scale(0.65);
                right: -40px;
                top: -20px;
            }
        }
    </style>
</head>
<body>

    <div id="viewport-camera">
        
        <!-- TOP VIEWPORT: CORNER TREE WITH VARIED LEAF SHAPES -->
        <div class="world-top">
            <div class="tree-container">
                <!-- Smooth SVG Curving Trunk & Branches -->
                <svg class="tree-trunk-svg" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M260 600 C 270 480, 240 380, 220 280 C 200 180, 240 100, 250 40" stroke="#22222d" stroke-width="28" stroke-linecap="round"/>
                    <path d="M230 320 C 180 260, 130 240, 90 220" stroke="#22222d" stroke-width="16" stroke-linecap="round"/>
                    <path d="M235 210 C 280 160, 310 140, 340 120" stroke="#22222d" stroke-width="14" stroke-linecap="round"/>
                    <path d="M210 390 C 160 350, 120 340, 80 330" stroke="#22222d" stroke-width="18" stroke-linecap="round"/>
                </svg>

                <!-- Canopy built with varied FontAwesome leaf icon shapes -->
                <div class="tree-canopy" id="tree-canopy">
                    <!-- Javascript populates multiple leaf shapes dynamically -->
                </div>
            </div>
        </div>

        <!-- HERO TRAVELLING LEAF ELEMENT -->
        <div id="hero-leaf">
            <i class="fa-solid fa-leaf"></i>
        </div>

        <!-- BOTTOM VIEWPORT: GROUND & CENTERED TEXT REVEAL -->
        <div class="world-bottom">
            <canvas id="wind-canvas"></canvas>

            <!-- Centered Gorilla Productions Text -->
            <h1 id="title" class="branding-title">
                Gorilla Productions<span class="leaf-spacer"></span>
            </h1>

            <!-- Black & Gray Outline Ground -->
            <div class="ground-wrapper">
                <div class="ground-line"></div>
                <div class="ground-fill"></div>
            </div>
        </div>

    </div>

    <script>
        // 1. GENERATE A DETAILED CORNER CANOPY WITH VARIED LEAF SHAPES
        const canopy = document.getElementById('tree-canopy');
        
        // FontAwesome icon classes for various leaf shapes
        const leafIcons = [
            'fa-solid fa-leaf',         // Standard leaf
            'fa-solid fa-tree-city',    // Organic cluster shape
            'fa-brands fa-envira',      // Curved dual leaf
            'fa-solid fa-seedling',     // Twin sprout leaf
            'fa-solid fa-clover'        // Soft leaf shape
        ];

        const leafPositions = [
            { top: '10px', left: '180px', size: '2.5rem', rot: '10deg', iconIdx: 0 },
            { top: '25px', left: '120px', size: '2.1rem', rot: '-20deg', iconIdx: 2 },
            { top: '30px', left: '240px', size: '2.4rem', rot: '30deg', iconIdx: 1 },
            { top: '60px', left: '80px', size: '2.8rem', rot: '-35deg', iconIdx: 0 },
            { top: '70px', left: '290px', size: '2.2rem', rot: '45deg', iconIdx: 2 },
            { top: '90px', left: '160px', size: '3.2rem', rot: '5deg', iconIdx: 3 },
            { top: '120px', left: '50px', size: '2.6rem', rot: '-45deg', iconIdx: 0 },
            { top: '130px', left: '230px', size: '2.9rem', rot: '20deg', iconIdx: 1 },
            { top: '140px', left: '320px', size: '2.3rem', rot: '50deg', iconIdx: 2 },
            { top: '180px', left: '100px', size: '3.0rem', rot: '-15deg', iconIdx: 3 },
            { top: '190px', left: '200px', size: '2.7rem', rot: '15deg', iconIdx: 0 },
            { top: '220px', left: '280px', size: '2.5rem', rot: '35deg', iconIdx: 4 },
            { top: '240px', left: '140px', size: '2.8rem', rot: '-25deg', iconIdx: 2 },
            { top: '280px', left: '80px', size: '2.4rem', rot: '-40deg', iconIdx: 0 }
        ];

        leafPositions.forEach((pos, idx) => {
            const leaf = document.createElement('i');
            leaf.className = `${leafIcons[pos.iconIdx]} canopy-leaf`;
            leaf.style.top = pos.top;
            leaf.style.left = pos.left;
            leaf.style.fontSize = pos.size;
            leaf.style.transform = `rotate(${pos.rot})`;
            leaf.style.animationDelay = `${(idx % 6) * 0.35}s`;
            canopy.appendChild(leaf);
        });

        // 2. PRECISE TIMED ANIMATION SEQUENCER
        const camera = document.getElementById('viewport-camera');
        const heroLeaf = document.getElementById('hero-leaf');
        const title = document.getElementById('title');

        // Step A: Detach and fall from corner tree (0.4s)
        setTimeout(() => {
            heroLeaf.classList.add('animate-leaf-drop');
        }, 400);

        // Step B: Viewport camera smooth pan down to ground (1.8s)
        setTimeout(() => {
            camera.classList.add('pan-down');
        }, 1800);

        // Step C: Leaf touches ground -> Wind blows leaf up toward center (4.6s)
        setTimeout(() => {
            heroLeaf.classList.add('animate-leaf-wind-blow');
            triggerWindCanvasEffect();
        }, 4600);

        // Step D: Reveal Centered Title (5.6s)
        setTimeout(() => {
            title.classList.add('show');
        }, 5600);

        // Step E: Leaf smoothly returns to lock onto the end of 'Productions' (6.4s)
        setTimeout(() => {
            heroLeaf.classList.add('animate-leaf-return-to-text');
        }, 6400);

        // 3. CANVAS WIND STREAM LINES EFFECT
        function triggerWindCanvasEffect() {
            const canvas = document.getElementById('wind-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const lines = [];
            for (let i = 0; i < 30; i++) {
                lines.push({
                    x: Math.random() * -200 - 100,
                    y: canvas.height - 180 + (Math.random() * 120 - 60),
                    length: 100 + Math.random() * 150,
                    speed: 20 + Math.random() * 18,
                    width: 1 + Math.random() * 2.5,
                    alpha: 0.3 + Math.random() * 0.6
                });
            }

            let frames = 0;
            function renderWind() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                lines.forEach(line => {
                    ctx.beginPath();
                    ctx.moveTo(line.x, line.y);
                    ctx.lineTo(line.x + line.length, line.y - 30);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${line.alpha})`;
                    ctx.lineWidth = line.width;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ffffff';
                    ctx.stroke();

                    line.x += line.speed;
                });

                frames++;
                if (frames < 75) {
                    requestAnimationFrame(renderWind);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            renderWind();
        }
    </script>
</body>
</html>
